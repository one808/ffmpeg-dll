name: Build ffmpeg.dll (Win32)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 g++-mingw-w64-i686 nasm yasm pkg-config make git

      - name: Clone FFmpeg
        run: |
          git clone --depth=1 --branch=release/7.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg

      - name: Configure FFmpeg
        run: |
          cd ffmpeg
          ./configure \
            --prefix="${{ github.workspace }}/prefix" \
            --target-os=mingw32 \
            --arch=x86 \
            --cross-prefix=i686-w64-mingw32- \
            --enable-shared \
            --disable-static \
            --enable-cross-compile \
            --disable-debug \
            --disable-doc \
            --disable-ffplay \
            --disable-ffprobe \
            --extra-cflags="-O2"

      - name: Build
        run: |
          cd ffmpeg
          make -j$(nproc) || echo "make had errors, checking objects"

      - name: Verify fftools objects
        id: verify
        run: |
          cd ffmpeg
          ls fftools/*.o 2>/dev/null && echo "objects_ok=true" >> "$GITHUB_OUTPUT" || echo "objects_ok=false" >> "$GITHUB_OUTPUT"

      - name: Manual compile fftools
        if: steps.verify.outputs.objects_ok == 'false'
        run: |
          cd ffmpeg
          CC=i686-w64-mingw32-gcc
          FLAGS="-O2 -D_ISOC99_SOURCE -D_FILE_OFFSET_BITS=64 -D_LARGEFILE_SOURCE -D_WIN32_WINNT=0x0600 -D__USE_MINGW_ANSI_STDIO=1 -DHAVE_AV_CONFIG_H -I. -Ifftools"
          for src in fftools/cmdutils.c fftools/ffmpeg.c fftools/ffmpeg_dec.c fftools/ffmpeg_demux.c fftools/ffmpeg_enc.c fftools/ffmpeg_filter.c fftools/ffmpeg_mux.c fftools/ffmpeg_mux_init.c fftools/ffmpeg_opt.c fftools/ffmpeg_sched.c fftools/objpool.c fftools/sync_queue.c fftools/thread_queue.c; do
            $CC $FLAGS -c "$src" -o "${src%.c}.o" || exit 1
          done

      - name: Build ffmpeg.dll
        run: |
          cd ffmpeg
          CC=i686-w64-mingw32-gcc
          $CC -O2 -I. -Ifftools -c ../src/ffmpeg_dll.c -o fftools/ffmpeg_dll.o

          # Use .lib files generated by make in the build tree
          $CC -shared -o ../ffmpeg.dll fftools/*.o \
            -Llibavcodec -Llibavformat -Llibavutil \
            -Llibswscale -Llibswresample -Llibavfilter \
            -lavcodec -lavformat -lavutil -lswscale -lswresample -lavfilter \
            -lws2_32 -lbcrypt -lpthread \
            -Wl,--out-implib,../libffmpeg.dll.a \
            -Wl,--export-all-symbols
          file ../ffmpeg.dll

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp ffmpeg.dll release/
          cp libffmpeg.dll.a release/
          # Copy shared DLLs from FFmpeg build tree
          find ffmpeg -name '*.dll' -exec cp {} release/ \;
          ls -la release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-dll-win32
          path: release/

      - name: Create release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ffmpeg.dll Win32"
          files: "release/*"
